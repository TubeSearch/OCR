<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Phrase Finder</title>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0eff5;
    --muted: #888798;
    --accent: #7c6ef5;
    --accent-glow: rgba(124,110,245,0.25);
    --highlight: rgba(255, 214, 0, 0.45);
    --highlight-border: rgba(255, 214, 0, 0.9);
    --success: #3ecf8e;
    --danger: #f06b6b;
    --radius: 12px;
    --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 820px;
    margin-bottom: 1.25rem;
  }

  .card-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* Drop zone */
  #drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 10px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  #drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #drop-zone .icon {
    font-size: 2rem;
    margin-bottom: 0.6rem;
    display: block;
  }

  #drop-zone p { color: var(--muted); font-size: 0.9rem; }
  #drop-zone strong { color: var(--text); }

  /* Search row */
  .search-row {
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-size: 0.95rem;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.4rem;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Options row */
  .options-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-top: 0.9rem;
  }

  label.toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  label.toggle input[type="checkbox"] {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
    cursor: pointer;
  }

  /* Status bar */
  #status-bar {
    font-size: 0.82rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    min-height: 1.5rem;
    margin-top: 0.5rem;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .dot.active { background: var(--accent); animation: pulse 1s infinite; }
  .dot.ok { background: var(--success); }
  .dot.err { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* Canvas area */
  #canvas-wrap {
    position: relative;
    display: inline-block;
    max-width: 100%;
    border-radius: 8px;
    overflow: hidden;
    line-height: 0;
  }

  #canvas-wrap canvas {
    max-width: 100%;
    display: block;
    border-radius: 8px;
  }

  #overlay-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    border-radius: 8px;
  }

  #image-section {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  #match-count {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }

  #match-count strong { color: var(--text); }

  /* Recognized text preview */
  #ocr-text-preview {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'Menlo', 'Consolas', monospace;
    line-height: 1.6;
    max-height: 100px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
    margin-top: 0.75rem;
    white-space: pre-wrap;
    display: none;
  }

  /* Progress bar */
  #progress-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<header>
  <h1>OCR Phrase Finder</h1>
  <p>Upload an image · OCR with Tesseract · Highlight any phrase like Apple Photos</p>
</header>

<div class="card">
  <div class="card-title">Image</div>
  <div id="drop-zone">
    <input type="file" accept="image/*" id="file-input">
    <span class="icon">🖼</span>
    <p><strong>Drop an image here</strong> or click to browse</p>
    <p style="margin-top:0.3rem;font-size:0.78rem;">PNG, JPG, WEBP, BMP — processed entirely in your browser</p>
  </div>
</div>

<div class="card">
  <div class="card-title">Search</div>
  <div class="search-row">
    <input type="text" id="phrase-input" placeholder="Type a word or phrase to highlight…" disabled>
    <button id="search-btn" disabled>Find</button>
  </div>
  <div class="options-row">
    <label class="toggle">
      <input type="checkbox" id="case-sensitive"> Case-sensitive
    </label>
    <label class="toggle">
      <input type="checkbox" id="show-all-words"> Show all word boxes
    </label>
    <label class="toggle">
      <input type="checkbox" id="whitelist-only" checked> Use original char whitelist
    </label>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status-bar"><div class="dot" id="status-dot"></div><span id="status-text">Load an image to begin.</span></div>
</div>

<div class="card" id="image-section">
  <div class="card-title" id="result-label">Result</div>
  <div style="display:flex;justify-content:center;">
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
    </div>
  </div>
  <div id="match-count"></div>
  <div id="ocr-text-preview"></div>
</div>

<script>
const fileInput    = document.getElementById('file-input');
const dropZone     = document.getElementById('drop-zone');
const phraseInput  = document.getElementById('phrase-input');
const searchBtn    = document.getElementById('search-btn');
const caseCb       = document.getElementById('case-sensitive');
const showAllCb    = document.getElementById('show-all-words');
const whitelistCb  = document.getElementById('whitelist-only');
const mainCanvas   = document.getElementById('main-canvas');
const overlayCanvas= document.getElementById('overlay-canvas');
const imageSection = document.getElementById('image-section');
const matchCount   = document.getElementById('match-count');
const statusDot    = document.getElementById('status-dot');
const statusText   = document.getElementById('status-text');
const progressWrap = document.getElementById('progress-wrap');
const progressBar  = document.getElementById('progress-bar');
const ocrPreview   = document.getElementById('ocr-text-preview');

let ocrWords = [];
let currentImage = null;

function setStatus(msg, state = 'idle') {
  statusText.textContent = msg;
  statusDot.className = 'dot' + (state === 'busy' ? ' active' : state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
}

function setProgress(pct) {
  if (pct <= 0) { progressWrap.style.display = 'none'; return; }
  progressWrap.style.display = 'block';
  progressBar.style.width = pct + '%';
}

// Apply the same preprocessing as LabelOCR.cpp:
// 1. medianBlur (3x3 median)
// 2. High-pass sharpening kernel (5x5)
// 3. Convert to grayscale
function preProcess(imgCanvas) {
  const w = imgCanvas.width, h = imgCanvas.height;
  const ctx = imgCanvas.getContext('2d');
  const src = ctx.getImageData(0, 0, w, h);
  const data = src.data;

  // 1. 3x3 median blur (per channel)
  const med = new Uint8ClampedArray(data.length);
  const neighbors = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      for (let c = 0; c < 3; c++) {
        neighbors.length = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const nx = Math.min(Math.max(x + dx, 0), w - 1);
            const ny = Math.min(Math.max(y + dy, 0), h - 1);
            neighbors.push(data[(ny * w + nx) * 4 + c]);
          }
        }
        neighbors.sort((a, b) => a - b);
        med[(y * w + x) * 4 + c] = neighbors[4];
      }
      med[(y * w + x) * 4 + 3] = 255;
    }
  }

  // 2. 5x5 high-pass sharpening kernel (same as LabelOCR.cpp):
  // center = 25, all others = -1
  const kernel = Array(25).fill(-1); kernel[12] = 25;
  const sharp = new Uint8ClampedArray(data.length);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      for (let c = 0; c < 3; c++) {
        let sum = 0;
        for (let ky = -2; ky <= 2; ky++) {
          for (let kx = -2; kx <= 2; kx++) {
            const nx = Math.min(Math.max(x + kx, 0), w - 1);
            const ny = Math.min(Math.max(y + ky, 0), h - 1);
            sum += med[(ny * w + nx) * 4 + c] * kernel[(ky + 2) * 5 + (kx + 2)];
          }
        }
        sharp[(y * w + x) * 4 + c] = Math.min(255, Math.max(0, sum));
      }
      sharp[(y * w + x) * 4 + 3] = 255;
    }
  }

  // 3. Convert to grayscale (BT.601 luminance)
  const gray = new Uint8ClampedArray(data.length);
  for (let i = 0; i < w * h; i++) {
    const r = sharp[i * 4], g = sharp[i * 4 + 1], b = sharp[i * 4 + 2];
    const lum = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
    gray[i * 4] = gray[i * 4 + 1] = gray[i * 4 + 2] = lum;
    gray[i * 4 + 3] = 255;
  }

  const out = new ImageData(gray, w, h);
  return out;
}

async function runOCR(imgEl) {
  setStatus('Preprocessing image…', 'busy');
  setProgress(10);

  // Draw original to canvas
  mainCanvas.width = imgEl.naturalWidth;
  mainCanvas.height = imgEl.naturalHeight;
  const ctx = mainCanvas.getContext('2d');
  ctx.drawImage(imgEl, 0, 0);

  // Size overlay to match
  overlayCanvas.width = mainCanvas.width;
  overlayCanvas.height = mainCanvas.height;

  // Preprocess (mirror LabelOCR.cpp)
  const processedData = preProcess(mainCanvas);

  // Redraw original (for display)
  ctx.drawImage(imgEl, 0, 0);

  // Build a temp canvas with processed data for Tesseract
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = mainCanvas.width;
  tmpCanvas.height = mainCanvas.height;
  tmpCanvas.getContext('2d').putImageData(processedData, 0, 0);

  setStatus('Running Tesseract OCR…', 'busy');
  setProgress(30);

  try {
    // Mirror the C++ Tesseract config exactly:
    // OEM_DEFAULT, PSM_SINGLE_BLOCK, char whitelist
    const charWhitelist = whitelistCb.checked
      ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
      : '';

    const worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          setProgress(30 + Math.round(m.progress * 60));
        }
      }
    });

    await worker.setParameters({
      tessedit_pageseg_mode: '6',  // PSM_SINGLE_BLOCK = 6
      tessedit_char_whitelist: charWhitelist,
    });

    const result = await worker.recognize(tmpCanvas);
    await worker.terminate();

    setProgress(95);

    ocrWords = result.data.words.map(w => ({
      text: w.text.replace(/[?]/g, ''),
      bbox: w.bbox,
      conf: w.confidence
    })).filter(w => w.text.trim().length > 0);

    const fullText = result.data.text;
    ocrPreview.textContent = fullText.trim();
    ocrPreview.style.display = 'block';

    setProgress(100);
    setTimeout(() => setProgress(0), 600);

    phraseInput.disabled = false;
    searchBtn.disabled = false;
    phraseInput.focus();

    setStatus(`OCR complete — ${ocrWords.length} words detected.`, 'ok');
    imageSection.style.display = 'flex';
    clearHighlights();
    matchCount.textContent = '';

    // Auto-highlight if phrase already typed
    if (phraseInput.value.trim()) doSearch();

  } catch (e) {
    setStatus('OCR failed: ' + e.message, 'err');
    setProgress(0);
    console.error(e);
  }
}

function clearHighlights() {
  const ctx = overlayCanvas.getContext('2d');
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
}

function doSearch() {
  clearHighlights();
  const phrase = phraseInput.value.trim();

  const scaleX = mainCanvas.width / mainCanvas.offsetWidth;
  const scaleY = mainCanvas.height / mainCanvas.offsetHeight;

  const ctx = overlayCanvas.getContext('2d');
  const allWords = ocrWords;

  if (showAllCb.checked) {
    ctx.strokeStyle = 'rgba(124,110,245,0.4)';
    ctx.lineWidth = 1.5;
    for (const w of allWords) {
      ctx.strokeRect(w.bbox.x0, w.bbox.y0, w.bbox.x1 - w.bbox.x0, w.bbox.y1 - w.bbox.y0);
    }
  }

  if (!phrase) { matchCount.textContent = ''; return; }

  const words = phrase.split(/\s+/);
  const compare = (a, b) => caseCb.checked ? a === b : a.toLowerCase() === b.toLowerCase();

  let matches = 0;

  // Sliding window over ocrWords to find consecutive word sequences
  for (let i = 0; i <= allWords.length - words.length; i++) {
    let hit = true;
    for (let j = 0; j < words.length; j++) {
      if (!compare(allWords[i + j].text, words[j])) { hit = false; break; }
    }
    if (hit) {
      matches++;
      const group = allWords.slice(i, i + words.length);
      const x0 = Math.min(...group.map(w => w.bbox.x0));
      const y0 = Math.min(...group.map(w => w.bbox.y0));
      const x1 = Math.max(...group.map(w => w.bbox.x1));
      const y1 = Math.max(...group.map(w => w.bbox.y1));

      const pad = 4;

      // Yellow highlight fill (like Apple Photos)
      ctx.fillStyle = 'rgba(255, 214, 0, 0.40)';
      ctx.beginPath();
      ctx.roundRect(x0 - pad, y0 - pad, (x1 - x0) + pad * 2, (y1 - y0) + pad * 2, 4);
      ctx.fill();

      // Bright border
      ctx.strokeStyle = 'rgba(255, 195, 0, 0.95)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(x0 - pad, y0 - pad, (x1 - x0) + pad * 2, (y1 - y0) + pad * 2, 4);
      ctx.stroke();

      // Subtle glow
      ctx.strokeStyle = 'rgba(255, 214, 0, 0.25)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.roundRect(x0 - pad - 2, y0 - pad - 2, (x1 - x0) + (pad + 2) * 2, (y1 - y0) + (pad + 2) * 2, 6);
      ctx.stroke();
    }
  }

  if (matches === 0) {
    matchCount.innerHTML = `<strong style="color:var(--danger)">No matches found</strong> for "${phrase}"`;
  } else {
    matchCount.innerHTML = `<strong style="color:var(--success)">${matches} match${matches > 1 ? 'es' : ''}</strong> found for "<strong>${phrase}</strong>"`;
  }
}

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    currentImage = img;
    ocrWords = [];
    phraseInput.disabled = true;
    searchBtn.disabled = true;
    matchCount.textContent = '';
    ocrPreview.style.display = 'none';
    runOCR(img);
  };
  img.src = url;
}

fileInput.addEventListener('change', e => loadImage(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  loadImage(e.dataTransfer.files[0]);
});

searchBtn.addEventListener('click', doSearch);
phraseInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
showAllCb.addEventListener('change', () => { if (ocrWords.length) doSearch(); });
caseCb.addEventListener('change', () => { if (ocrWords.length) doSearch(); });
whitelistCb.addEventListener('change', () => { if (currentImage) runOCR(currentImage); });
</script>
</body>
</html>
